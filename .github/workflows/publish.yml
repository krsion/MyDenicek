name: Publish packages to JSR

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Verify packages before publish
        run: |
          cd packages/core && deno check mod.ts && deno doc --lint mod.ts

      - name: Publish workspace to JSR
        run: deno publish --allow-dirty
