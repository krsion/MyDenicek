name: Azure infra setup

on:
  workflow_dispatch:
    inputs:
      name_prefix:
        description: Prefix used for derived Azure resource names
        required: true
        default: mydenicek-core-krsion-dev
        type: string
      location:
        description: Azure region
        required: true
        default: westeurope
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      LOCATION: ${{ inputs.location }}
      NAME_PREFIX: ${{ inputs.name_prefix }}
      IMAGE_REPOSITORY: sync-server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve deployment names
        shell: bash
        run: |
          set -euo pipefail
          NORMALIZED_PREFIX="$(echo "$NAME_PREFIX" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//')"
          if [ -z "$NORMALIZED_PREFIX" ]; then
            echo "Name prefix must contain at least one alphanumeric character." >&2
            exit 1
          fi

          BASE="$(echo "$NORMALIZED_PREFIX" | tr -cd 'a-z0-9')"
          ACR_NAME="${BASE}acr"
          ACR_NAME="${ACR_NAME:0:50}"
          if [ "${#ACR_NAME}" -lt 5 ]; then
            echo "Derived ACR name '$ACR_NAME' is too short. Use a longer name_prefix." >&2
            exit 1
          fi

          PERSISTENCE_STORAGE_ACCOUNT_NAME="${BASE}sync"
          PERSISTENCE_STORAGE_ACCOUNT_NAME="${PERSISTENCE_STORAGE_ACCOUNT_NAME:0:24}"
          if [ "${#PERSISTENCE_STORAGE_ACCOUNT_NAME}" -lt 3 ]; then
            echo "Derived storage account name '$PERSISTENCE_STORAGE_ACCOUNT_NAME' is too short. Use a longer name_prefix." >&2
            exit 1
          fi

          CONTAINER_APP_ENVIRONMENT_NAME="cae-$NORMALIZED_PREFIX"
          CONTAINER_APP_ENVIRONMENT_NAME="${CONTAINER_APP_ENVIRONMENT_NAME:0:60}"
          CONTAINER_APP_NAME="${NORMALIZED_PREFIX}-sync"
          CONTAINER_APP_NAME="${CONTAINER_APP_NAME:0:32}"
          PLAYGROUND_STATIC_WEB_APP_NAME="${NORMALIZED_PREFIX}-playground"
          PLAYGROUND_STATIC_WEB_APP_NAME="${PLAYGROUND_STATIC_WEB_APP_NAME:0:40}"
          MYWEBNICEK_STATIC_WEB_APP_NAME="${NORMALIZED_PREFIX}-mywebnicek"
          MYWEBNICEK_STATIC_WEB_APP_NAME="${MYWEBNICEK_STATIC_WEB_APP_NAME:0:40}"
          RESOURCE_GROUP="rg-$NORMALIZED_PREFIX"

          echo "RESOURCE_GROUP=$RESOURCE_GROUP" >> "$GITHUB_ENV"
          echo "ACR_NAME=$ACR_NAME" >> "$GITHUB_ENV"
          echo "CONTAINER_APP_ENVIRONMENT_NAME=$CONTAINER_APP_ENVIRONMENT_NAME" >> "$GITHUB_ENV"
          echo "CONTAINER_APP_NAME=$CONTAINER_APP_NAME" >> "$GITHUB_ENV"
          echo "DEPLOYMENT_NAME=azure-infra-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_ENV"
          echo "PERSISTENCE_STORAGE_ACCOUNT_NAME=$PERSISTENCE_STORAGE_ACCOUNT_NAME" >> "$GITHUB_ENV"
          echo "PLAYGROUND_STATIC_WEB_APP_NAME=$PLAYGROUND_STATIC_WEB_APP_NAME" >> "$GITHUB_ENV"
          echo "MYWEBNICEK_STATIC_WEB_APP_NAME=$MYWEBNICEK_STATIC_WEB_APP_NAME" >> "$GITHUB_ENV"

      - name: Register Azure resource providers
        shell: bash
        run: |
          set -euo pipefail
          az provider register --namespace Microsoft.App --wait --only-show-errors
          az provider register --namespace Microsoft.Authorization --wait --only-show-errors
          az provider register --namespace Microsoft.ContainerRegistry --wait --only-show-errors
          az provider register --namespace Microsoft.Storage --wait --only-show-errors
          az provider register --namespace Microsoft.Web --wait --only-show-errors

      - name: Create or reuse resource group
        shell: bash
        run: |
          set -euo pipefail
          az group create \
            --name "$RESOURCE_GROUP" \
            --location "$LOCATION" \
            --only-show-errors \
            --output table

      - name: Remove stale AcrPull role assignment
        shell: bash
        run: |
          set -euo pipefail
          REGISTRY_ID="$(az acr show --name "$ACR_NAME" --resource-group "$RESOURCE_GROUP" --query id -o tsv)"
          PRINCIPAL_ID="$(az resource show --resource-group "$RESOURCE_GROUP" --name "$CONTAINER_APP_NAME" --resource-type Microsoft.App/containerApps --query identity.principalId -o tsv 2>/dev/null || true)"

          if [ -n "$PRINCIPAL_ID" ]; then
            ASSIGNMENT_IDS="$(az role assignment list --assignee-object-id "$PRINCIPAL_ID" --scope "$REGISTRY_ID" --role AcrPull --query '[].id' -o tsv)"

            if [ -n "$ASSIGNMENT_IDS" ]; then
              while IFS= read -r ASSIGNMENT_ID; do
                [ -n "$ASSIGNMENT_ID" ] || continue
                az role assignment delete --ids "$ASSIGNMENT_ID" --only-show-errors
              done <<< "$ASSIGNMENT_IDS"
            fi
          fi

      - name: Deploy Azure infrastructure
        shell: bash
        run: |
          set -euo pipefail
          az deployment group create \
            --name "$DEPLOYMENT_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --template-file infra/azure/sync-server/main.bicep \
            --parameters \
              containerAppEnvironmentName="$CONTAINER_APP_ENVIRONMENT_NAME" \
              containerAppName="$CONTAINER_APP_NAME" \
              containerImageRepository="$IMAGE_REPOSITORY" \
              containerImageTag=latest \
              containerRegistryName="$ACR_NAME" \
              persistenceStorageAccountName="$PERSISTENCE_STORAGE_ACCOUNT_NAME" \
              playgroundStaticWebAppName="$PLAYGROUND_STATIC_WEB_APP_NAME" \
              mywebnicekStaticWebAppName="$MYWEBNICEK_STATIC_WEB_APP_NAME" \
            --only-show-errors \
            --output table

      - name: Ensure AcrPull role assignment
        shell: bash
        run: |
          set -euo pipefail
          REGISTRY_ID="$(az acr show --name "$ACR_NAME" --resource-group "$RESOURCE_GROUP" --query id -o tsv)"
          PRINCIPAL_ID="$(az resource show --resource-group "$RESOURCE_GROUP" --name "$CONTAINER_APP_NAME" --resource-type Microsoft.App/containerApps --query identity.principalId -o tsv)"
          EXISTING_ASSIGNMENT="$(az role assignment list --assignee-object-id "$PRINCIPAL_ID" --scope "$REGISTRY_ID" --role AcrPull --query '[0].id' -o tsv)"

          if [ -z "$EXISTING_ASSIGNMENT" ]; then
            az role assignment create \
              --assignee-object-id "$PRINCIPAL_ID" \
              --assignee-principal-type ServicePrincipal \
              --role AcrPull \
              --scope "$REGISTRY_ID" \
              --only-show-errors \
              --output none
          fi

      - name: Enable ACR ARM-token authentication
        shell: bash
        run: |
          set -euo pipefail
          az acr config authentication-as-arm update \
            --registry "$ACR_NAME" \
            --status enabled \
            --only-show-errors

      - name: Print deployment outputs
        shell: bash
        run: |
          set -euo pipefail
          echo "Playground: $(az deployment group show --name "$DEPLOYMENT_NAME" --resource-group "$RESOURCE_GROUP" --query properties.outputs.playgroundStaticWebAppUrl.value -o tsv)"
          echo "MyWebnicek: $(az deployment group show --name "$DEPLOYMENT_NAME" --resource-group "$RESOURCE_GROUP" --query properties.outputs.mywebnicekStaticWebAppUrl.value -o tsv)"
          echo "Sync server: $(az deployment group show --name "$DEPLOYMENT_NAME" --resource-group "$RESOURCE_GROUP" --query properties.outputs.containerAppUrl.value -o tsv)"
          echo "Health check: $(az deployment group show --name "$DEPLOYMENT_NAME" --resource-group "$RESOURCE_GROUP" --query properties.outputs.healthCheckUrl.value -o tsv)"
          echo "WebSocket sync: $(az deployment group show --name "$DEPLOYMENT_NAME" --resource-group "$RESOURCE_GROUP" --query properties.outputs.webSocketSyncUrl.value -o tsv)"
          echo "ACR login server: $(az deployment group show --name "$DEPLOYMENT_NAME" --resource-group "$RESOURCE_GROUP" --query properties.outputs.containerRegistryLoginServer.value -o tsv)"
          echo ""
          echo "Next: store the Static Web Apps deployment tokens as GitHub secrets."
          echo "Playground command:"
          echo "az staticwebapp secrets list --name $PLAYGROUND_STATIC_WEB_APP_NAME --resource-group $RESOURCE_GROUP --query properties.apiKey -o tsv"
          echo "MyWebnicek command:"
          echo "az staticwebapp secrets list --name $MYWEBNICEK_STATIC_WEB_APP_NAME --resource-group $RESOURCE_GROUP --query properties.apiKey -o tsv"
