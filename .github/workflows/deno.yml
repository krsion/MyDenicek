# This workflow installs Deno and validates the monorepo packages.

name: Deno CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
      - run: deno fmt --check deno.json README.md main.ts
      - run: deno task fmt:check
        working-directory: packages/core
      - run: deno task fmt:check
        working-directory: packages/sync-server
      - run: deno task fmt:check
        working-directory: apps/sync-server
      - run: deno task fmt:check
        working-directory: apps/playground
      - run: deno task fmt:check
        working-directory: apps/mywebnicek

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
      - run: deno task lint
        working-directory: packages/core
      - run: deno task lint
        working-directory: packages/sync-server
      - run: deno task lint
        working-directory: apps/sync-server
      - run: deno task lint
        working-directory: apps/playground
      - run: deno task lint
        working-directory: apps/mywebnicek

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
      - run: deno task check
        working-directory: packages/core
      - run: deno task check
        working-directory: packages/sync-server
      - run: deno task check
        working-directory: apps/sync-server
      - run: deno task check
        working-directory: apps/playground
      - run: deno task check
        working-directory: apps/mywebnicek

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
      - run: deno task test
        working-directory: packages/core
      - run: deno task test
        working-directory: packages/sync-server
      - run: deno task test
        working-directory: apps/playground
      - run: deno task test
        working-directory: apps/mywebnicek

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
      - working-directory: apps/playground
        run: deno install
      - working-directory: apps/mywebnicek
        run: deno install
      - run: deno task build
