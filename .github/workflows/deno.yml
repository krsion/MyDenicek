# Validates and deploys the monorepo on push to main.
# CI jobs (fmt, lint, check, test, build) run in parallel.
# Deploy jobs run after all CI jobs pass.

name: CI & Deploy

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
      - run: deno fmt --check deno.json README.md main.ts
      - run: deno fmt --check mod.ts internal.ts core tests tools deno.json
        working-directory: packages/core
      - run: deno fmt --check .
        working-directory: packages/sync
      - run: deno fmt --check .
        working-directory: apps/sync-server
      - run: deno fmt --check deno.json README.md index.html src vite.config.ts tsconfig.json tsconfig.node.json
        working-directory: apps/playground
      - run: deno fmt --check src/ deno.json index.html vite.config.ts
        working-directory: apps/mywebnicek

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
      - run: deno lint . && deno doc --lint mod.ts
        working-directory: packages/core
      - run: deno lint .
        working-directory: packages/sync
      - run: deno lint .
        working-directory: apps/sync-server
      - run: deno lint src vite.config.ts
        working-directory: apps/playground
      - run: deno lint src/
        working-directory: apps/mywebnicek

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
      - run: deno check mod.ts tests/**/*.ts
        working-directory: packages/core
      - run: deno check mod.ts
        working-directory: packages/sync
      - run: deno check main.ts
        working-directory: apps/sync-server
      - run: deno check src/main.tsx src/tests/peer-session.test.ts src/tests/sync-service.test.ts
        working-directory: apps/playground
      - run: deno check src/main.tsx
        working-directory: apps/mywebnicek

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
      - run: deno test --allow-all --no-check tests
        working-directory: packages/core
      - run: deno test --allow-read --allow-write tests
        working-directory: packages/sync
      - run: deno test --allow-all src/tests
        working-directory: apps/playground

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
      - run: deno install
        working-directory: apps/playground
      - run: deno install
        working-directory: apps/mywebnicek
      - run: deno task build

  # Deploy to GitHub Pages after all CI jobs pass (push to main only)
  deploy-pages:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [fmt, lint, check, test, build]
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
      - run: deno install
        working-directory: apps/mywebnicek
      - run: deno task build
        working-directory: apps/mywebnicek
      - uses: actions/upload-pages-artifact@v4
        with:
          path: apps/mywebnicek/dist
      - uses: actions/deploy-pages@v4

  # Deploy sync server to Azure after all CI jobs pass (push to main only)
  deploy-sync-server:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [fmt, lint, check, test, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      IMAGE_REPOSITORY: sync-server
      # Using the commit SHA as the image tag ensures every deployment
      # produces a new ARM template, which forces Azure Container Apps
      # to create a new revision and pull the freshly built image.
      # A static tag like "latest" leaves the ARM template unchanged and
      # Azure therefore keeps running the previous image.
      IMAGE_TAG: ${{ github.sha }}
      NAME_PREFIX: mydenicek-core-krsion-dev
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - name: Resolve deployment names
        shell: bash
        run: |
          set -euo pipefail
          NORMALIZED_PREFIX="$(echo "$NAME_PREFIX" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//')"
          BASE="$(echo "$NORMALIZED_PREFIX" | tr -cd 'a-z0-9')"
          ACR_NAME="${BASE}acr"; ACR_NAME="${ACR_NAME:0:50}"
          STORAGE_NAME="${BASE}sync"; STORAGE_NAME="${STORAGE_NAME:0:24}"
          echo "ACR_NAME=$ACR_NAME" >> "$GITHUB_ENV"
          echo "CONTAINER_APP_ENVIRONMENT_NAME=cae-$NORMALIZED_PREFIX" >> "$GITHUB_ENV"
          echo "CONTAINER_APP_NAME=${NORMALIZED_PREFIX}-sync" >> "$GITHUB_ENV"
          echo "DEPLOYMENT_NAME=app-deploy-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_ENV"
          echo "PERSISTENCE_STORAGE_ACCOUNT_NAME=$STORAGE_NAME" >> "$GITHUB_ENV"
          echo "RESOURCE_GROUP=rg-$NORMALIZED_PREFIX" >> "$GITHUB_ENV"
      - name: Build and push sync-server image
        shell: bash
        run: |
          set -euo pipefail
          az acr config authentication-as-arm update --registry "$ACR_NAME" --status enabled --only-show-errors
          az acr build --resource-group "$RESOURCE_GROUP" --registry "$ACR_NAME" --image "$IMAGE_REPOSITORY:$IMAGE_TAG" --file apps/sync-server/Dockerfile .
      - name: Ensure AcrPull role assignment
        shell: bash
        run: |
          set -euo pipefail
          REGISTRY_ID="$(az acr show --name "$ACR_NAME" --resource-group "$RESOURCE_GROUP" --query id -o tsv)"
          PRINCIPAL_ID="$(az resource show --resource-group "$RESOURCE_GROUP" --name "$CONTAINER_APP_NAME" --resource-type Microsoft.App/containerApps --query identity.principalId -o tsv)"
          EXISTING="$(az role assignment list --assignee-object-id "$PRINCIPAL_ID" --scope "$REGISTRY_ID" --role AcrPull --query '[0].id' -o tsv)"
          if [ -z "$EXISTING" ]; then
            az role assignment create --assignee-object-id "$PRINCIPAL_ID" --assignee-principal-type ServicePrincipal --role AcrPull --scope "$REGISTRY_ID" --only-show-errors --output none
          fi
      - name: Redeploy sync-server
        shell: bash
        run: |
          set -euo pipefail
          az deployment group create \
            --name "$DEPLOYMENT_NAME" --resource-group "$RESOURCE_GROUP" \
            --template-file infra/azure/sync-server/main.bicep \
            --parameters containerAppEnvironmentName="$CONTAINER_APP_ENVIRONMENT_NAME" containerAppName="$CONTAINER_APP_NAME" containerImageRepository="$IMAGE_REPOSITORY" containerImageTag="$IMAGE_TAG" containerRegistryName="$ACR_NAME" persistenceStorageAccountName="$PERSISTENCE_STORAGE_ACCOUNT_NAME" \
            --only-show-errors --output table

  # E2E smoke test against the live deployment (after both deploys)
  e2e:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [deploy-pages, deploy-sync-server]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Wake sync-server (cold-start Azure Container App)
        shell: bash
        run: |
          set -euo pipefail
          URL="https://mydenicek-core-krsion-dev-sync.happyisland-d6dda219.westeurope.azurecontainerapps.io/healthz"
          echo "Polling $URL until it returns 200 (timeout 180s)..."
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 "$URL" || echo "000")
            if [ "$code" = "200" ]; then
              echo "sync-server ready after ${i} attempt(s)"
              exit 0
            fi
            echo "  attempt $i: status=$code, retrying in 3s"
            sleep 3
          done
          echo "sync-server did not become healthy in time" >&2
          exit 1
      - run: npm install @playwright/test
        working-directory: apps/mywebnicek
      - run: npx playwright install chromium
        working-directory: apps/mywebnicek
      - name: Run E2E tests against live site
        working-directory: apps/mywebnicek
        run: npx playwright test
      - name: Upload playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            apps/mywebnicek/test-results/
            apps/mywebnicek/playwright-report/
          if-no-files-found: ignore
          retention-days: 7
