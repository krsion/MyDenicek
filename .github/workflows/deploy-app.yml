name: Deploy sync server and frontend

on:
  workflow_dispatch:
    inputs:
      name_prefix:
        description: Prefix used for derived Azure resource names
        required: true
        default: mydenicek-core-krsion-dev
        type: string
      image_tag:
        description: Container image tag
        required: true
        default: latest
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      IMAGE_REPOSITORY: sync-server
      IMAGE_TAG: ${{ inputs.image_tag }}
      NAME_PREFIX: ${{ inputs.name_prefix }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve deployment names
        shell: bash
        run: |
          set -euo pipefail
          NORMALIZED_PREFIX="$(echo "$NAME_PREFIX" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//')"
          if [ -z "$NORMALIZED_PREFIX" ]; then
            echo "Name prefix must contain at least one alphanumeric character." >&2
            exit 1
          fi

          BASE="$(echo "$NORMALIZED_PREFIX" | tr -cd 'a-z0-9')"
          ACR_NAME="${BASE}acr"
          ACR_NAME="${ACR_NAME:0:50}"
          CONTAINER_APP_ENVIRONMENT_NAME="cae-$NORMALIZED_PREFIX"
          CONTAINER_APP_ENVIRONMENT_NAME="${CONTAINER_APP_ENVIRONMENT_NAME:0:60}"
          CONTAINER_APP_NAME="${NORMALIZED_PREFIX}-sync"
          CONTAINER_APP_NAME="${CONTAINER_APP_NAME:0:32}"
          PERSISTENCE_STORAGE_ACCOUNT_NAME="${BASE}sync"
          PERSISTENCE_STORAGE_ACCOUNT_NAME="${PERSISTENCE_STORAGE_ACCOUNT_NAME:0:24}"
          RESOURCE_GROUP="rg-$NORMALIZED_PREFIX"
          STATIC_WEB_APP_NAME="${NORMALIZED_PREFIX}-web"
          STATIC_WEB_APP_NAME="${STATIC_WEB_APP_NAME:0:40}"

          echo "ACR_NAME=$ACR_NAME" >> "$GITHUB_ENV"
          echo "CONTAINER_APP_ENVIRONMENT_NAME=$CONTAINER_APP_ENVIRONMENT_NAME" >> "$GITHUB_ENV"
          echo "CONTAINER_APP_NAME=$CONTAINER_APP_NAME" >> "$GITHUB_ENV"
          echo "DEPLOYMENT_NAME=app-deploy-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_ENV"
          echo "PERSISTENCE_STORAGE_ACCOUNT_NAME=$PERSISTENCE_STORAGE_ACCOUNT_NAME" >> "$GITHUB_ENV"
          echo "RESOURCE_GROUP=$RESOURCE_GROUP" >> "$GITHUB_ENV"
          echo "STATIC_WEB_APP_NAME=$STATIC_WEB_APP_NAME" >> "$GITHUB_ENV"

      - name: Build sync-server image in ACR
        shell: bash
        run: |
          set -euo pipefail
          az acr config authentication-as-arm update \
            --registry "$ACR_NAME" \
            --status enabled \
            --only-show-errors
          az acr build \
            --resource-group "$RESOURCE_GROUP" \
            --registry "$ACR_NAME" \
            --image "$IMAGE_REPOSITORY:$IMAGE_TAG" \
            --file apps/sync-server/Dockerfile \
            .

      - name: Ensure AcrPull role assignment
        shell: bash
        run: |
          set -euo pipefail
          REGISTRY_ID="$(az acr show --name "$ACR_NAME" --resource-group "$RESOURCE_GROUP" --query id -o tsv)"
          PRINCIPAL_ID="$(az resource show --resource-group "$RESOURCE_GROUP" --name "$CONTAINER_APP_NAME" --resource-type Microsoft.App/containerApps --query identity.principalId -o tsv)"
          EXISTING_ASSIGNMENT="$(az role assignment list --assignee-object-id "$PRINCIPAL_ID" --scope "$REGISTRY_ID" --role AcrPull --query '[0].id' -o tsv)"

          if [ -z "$EXISTING_ASSIGNMENT" ]; then
            az role assignment create \
              --assignee-object-id "$PRINCIPAL_ID" \
              --assignee-principal-type ServicePrincipal \
              --role AcrPull \
              --scope "$REGISTRY_ID" \
              --only-show-errors \
              --output none
          fi

      - name: Redeploy sync-server configuration
        shell: bash
        run: |
          set -euo pipefail
          az deployment group create \
            --name "$DEPLOYMENT_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --template-file infra/azure/sync-server/main.bicep \
            --parameters \
              containerAppEnvironmentName="$CONTAINER_APP_ENVIRONMENT_NAME" \
              containerAppName="$CONTAINER_APP_NAME" \
              containerImageRepository="$IMAGE_REPOSITORY" \
              containerImageTag="$IMAGE_TAG" \
              containerRegistryName="$ACR_NAME" \
              persistenceStorageAccountName="$PERSISTENCE_STORAGE_ACCOUNT_NAME" \
              staticWebAppName="$STATIC_WEB_APP_NAME" \
            --only-show-errors \
            --output table

      - name: Install frontend dependencies
        working-directory: apps/ui
        run: deno install

      - name: Build frontend
        working-directory: apps/ui
        run: deno task build

      - name: Deploy frontend to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          action: upload
          app_location: apps/ui/dist
          output_location: ''
          skip_app_build: true
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Print deployment outputs
        shell: bash
        run: |
          set -euo pipefail
          echo "Static Web App: $(az deployment group show --name "$DEPLOYMENT_NAME" --resource-group "$RESOURCE_GROUP" --query properties.outputs.staticWebAppUrl.value -o tsv)"
          echo "Sync server: $(az deployment group show --name "$DEPLOYMENT_NAME" --resource-group "$RESOURCE_GROUP" --query properties.outputs.containerAppUrl.value -o tsv)"
          echo "Health check: $(az deployment group show --name "$DEPLOYMENT_NAME" --resource-group "$RESOURCE_GROUP" --query properties.outputs.healthCheckUrl.value -o tsv)"
          echo "WebSocket sync: $(az deployment group show --name "$DEPLOYMENT_NAME" --resource-group "$RESOURCE_GROUP" --query properties.outputs.webSocketSyncUrl.value -o tsv)"
