name: Deploy mydenicek to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2

      - name: Install dependencies
        working-directory: apps/mywebnicek
        run: deno install

      - name: Lint
        working-directory: apps/mywebnicek
        run: deno task lint

      - name: Build
        working-directory: apps/mywebnicek
        run: deno task build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: apps/mywebnicek/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
