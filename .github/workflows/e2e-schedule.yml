# Daily smoke test against the live deployment.
# Runs only the E2E Playwright suite — no build, no deploy — so a failure
# here signals live-site breakage (e.g. Azure Container App drifted, GitHub
# Pages cache issues) rather than a code regression.

name: E2E (scheduled)

on:
  schedule:
    # 06:17 UTC daily. Non-round minute to avoid the top-of-hour burst.
    - cron: "17 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Wake sync-server (cold-start Azure Container App)
        shell: bash
        run: |
          set -euo pipefail
          URL="https://mydenicek-core-krsion-dev-sync.happyisland-d6dda219.westeurope.azurecontainerapps.io/healthz"
          echo "Polling $URL until it returns 200 (timeout 180s)..."
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 "$URL" || echo "000")
            if [ "$code" = "200" ]; then
              echo "sync-server ready after ${i} attempt(s)"
              exit 0
            fi
            echo "  attempt $i: status=$code, retrying in 3s"
            sleep 3
          done
          echo "sync-server did not become healthy in time" >&2
          exit 1
      - run: npm install @playwright/test
        working-directory: apps/mywebnicek
      - run: npx playwright install chromium
        working-directory: apps/mywebnicek
      - name: Run E2E tests against live site
        working-directory: apps/mywebnicek
        run: npx playwright test
      - name: Upload playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            apps/mywebnicek/test-results/
            apps/mywebnicek/playwright-report/
          if-no-files-found: ignore
          retention-days: 14
